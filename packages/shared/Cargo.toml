[package]
name = "nmcscan-shared"
version = "0.1.0"
edition = "2024"
description = "Shared models, repositories, and utilities for NMCScan"
license = "MIT"

[dependencies]
# Async runtime
tokio = { version = "1.48", features = ["rt-multi-thread", "sync", "net", "time", "io-util"] }

# Database
sea-orm = { version = "1.1", default-features = false, features = ["sqlx-postgres", "runtime-tokio-rustls", "macros", "with-chrono", "with-ipnetwork"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Networking
ipnetwork = { version = "0.21", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }

# Utilities
thiserror = "2"
chrono = { version = "0.4", default-features = false, features = ["serde", "clock"] }
tracing = "0.1"
regex = "1"
maxminddb = "0.27"
flate2 = { version = "1.0", default-features = false, features = ["rust_backend"] }
rand = { version = "0.8", default-features = false, features = ["std", "std_rng"] }
uuid = { version = "1.18", features = ["v3"] }
