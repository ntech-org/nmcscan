[package]
name = "nmcscan-scanner"
version = "0.1.0"
edition = "2024"
description = "NMCScan scanner service - high-performance Minecraft server scanning"
license = "MIT"

[dependencies]
# Shared library
nmcscan-shared = { path = "../shared" }
migration = { path = "../../migration" }

# Async runtime
tokio = { version = "1.48", features = ["rt-multi-thread", "macros", "net", "time", "sync", "io-util", "signal"] }

# Database (via shared, but need SeaORM types)
sea-orm = { version = "1.1", default-features = false, features = ["sqlx-postgres", "runtime-tokio-rustls", "macros", "with-chrono", "with-ipnetwork"] }
sea-orm-migration = { version = "1.1", default-features = false, features = ["runtime-tokio-rustls", "sqlx-postgres"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Networking & IP parsing
ipnetwork = { version = "0.21", features = ["serde"] }

# HTTP client (for ASN API calls)
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["env-filter", "fmt", "ansi", "std"] }

# Utilities
thiserror = "2"
chrono = { version = "0.4", default-features = false, features = ["serde", "clock"] }
maxminddb = "0.27"
flate2 = { version = "1.0", default-features = false, features = ["rust_backend"] }
sha2 = "0.10"
rand = { version = "0.8", default-features = false, features = ["std", "std_rng"] }

# CLI argument parsing
clap = { version = "4.5", default-features = false, features = ["derive", "env", "std", "help", "usage"] }
dotenvy = "0.15.7"
