# Honeypot and Security Research Network Exclusions
# These are known honeypot IPs, security research networks, and scanner infrastructure
# that should NEVER be scanned under any circumstances.
#
# Format: Same as exclude.conf - CIDR ranges and single IPs; only difference is separation, you can use the regular
# exclude.conf for this as well
#
# Lines starting with # are comments
#
# IMPORTANT: This file is loaded in ADDITION to exclude.conf
# If you receive abuse complaints, add the IPs here immediately.

# Note: Most major scanning services (Shodan, Censys, etc.) are already
# excluded via ASN organization name matching in the ASN categorization
# logic. This file is for specific IP ranges that need manual management.

# if you ever encounter any, we strongly recommend adding them here to prevent future issues. it will also help the project if you submit these to
# the project maintainers so they can be added to the default configuration for everyone.
