services:
  postgres:
    image: postgres:16-alpine
    container_name: nmcscan_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nmcscan
      - POSTGRES_PASSWORD=nmcscan_secret
      - POSTGRES_DB=nmcscan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      [
        "postgres",
        "-c",
        "max_connections=1000",
        "-c",
        "shared_buffers=512MB",
        "-c",
        "synchronous_commit=off",
        "-c",
        "work_mem=16MB",
      ]
  nmcscan:
    build: .
    container_name: nmcscan
    restart: unless-stopped
    depends_on:
      - postgres
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - API_KEY
      - CONTACT_EMAIL
      - DISCORD_LINK
      - LISTEN_ADDR=${LISTEN_ADDR:-0.0.0.0:3000}
      - DATABASE_URL=postgres://nmcscan:nmcscan_secret@postgres:5432/nmcscan
      - EXCLUDE_FILE=/app/exclude.conf
      - TARGET_RPS=${TARGET_RPS:-100}
      - TARGET_CONCURRENCY=${TARGET_CONCURRENCY:-1000}
      - TARGET_COLD_RPS
      - TEST_MODE=${TEST_MODE:-false}
      - TEST_MAX_SERVERS=${TEST_MAX_SERVERS:-50}
      - TEST_SCAN_INTERVAL=${TEST_SCAN_INTERVAL:-60}
      - TEST_REGIONS
    volumes:
      - ./data:/app/data
      - ./exclude.conf:/app/exclude.conf
    working_dir: /app
    command: ["/app/nmcscan"]

  dashboard:
    build: ./dashboard
    container_name: nmcscan_dashboard
    restart: unless-stopped
    depends_on:
      - nmcscan
    ports:
      - "${PORT:-3000}:5173"
    environment:
      - NODE_ENV=production
      - PORT=5173
      - BACKEND_URL=http://nmcscan:3000
      - DATABASE_URL=postgres://nmcscan:nmcscan_secret@postgres:5432/nmcscan
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - API_KEY=${API_KEY}
      - ALLOWED_USERS=${ALLOWED_USERS}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-}

volumes:
  data:
  postgres_data:
